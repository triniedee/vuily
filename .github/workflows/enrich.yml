name: Enrich Events

on:
  schedule:
    # Runs at midnight PT (08:00 UTC) every day
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run enrichment script
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/enrich-events.mjs

      - name: Commit updated enriched-events.json
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          SHA=$(gh api /repos/${GH_REPO}/contents/data/enriched-events.json --jq .sha)
          python3 scripts/commit-enriched.py
