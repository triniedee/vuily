name: Enrich Events

on:
  schedule:
    # Runs at midnight PT (08:00 UTC) every day
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run enrichment script
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/enrich-events.mjs

      - name: Commit updated enriched-events.json
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "vuily-bot"
          git config user.email "bot@vuily.fun"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git
          git add data/enriched-events.json
          git diff --cached --quiet || git commit -m "chore: update enriched events [skip ci]"
          git diff --quiet HEAD origin/main -- data/enriched-events.json || git push origin HEAD:main
