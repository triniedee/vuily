name: Enrich Events

on:
  schedule:
    # Runs at midnight PT (08:00 UTC) every day
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run enrichment script
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/enrich-events.mjs

      - name: Commit updated enriched-events.json
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Token length: ${#GH_TOKEN}"
          gh auth status
          SHA=$(gh api /repos/${{ github.repository }}/contents/data/enriched-events.json --jq .sha)
          CONTENT=$(base64 -w 0 data/enriched-events.json)
          gh api --method PUT /repos/${{ github.repository }}/contents/data/enriched-events.json \
            --field message="chore: update enriched events [skip ci]" \
            --field content="$CONTENT" \
            --field sha="$SHA" \
            --field "committer[name]=vuily-bot" \
            --field "committer[email]=bot@vuily.fun"
